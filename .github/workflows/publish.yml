name: Publish Package to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. تثبيت pnpm أولاً (خطوة إجبارية)
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # أو حدد الإصدار الذي تستخدمه محلياً

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm' # لتسريع العمليات مستقبلاً عبر كاش pnpm

      # 2. التثبيت والنشر باستخدام pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Build package
      #   run: pnpm build

      - name: Publish to npm
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_IMAGES_TRACKER }}